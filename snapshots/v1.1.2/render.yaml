services:
  - type: web
    name: xiangge-private-kitchen
    runtime: node
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.17.0
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        value: 544986911
      - key: DATA_DIR
        value: /var/data
      - key: UPLOADS_DIR
        value: /var/data/uploads
